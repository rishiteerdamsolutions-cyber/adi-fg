<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss:;"/>
  <title>ADI - FG : AI Developer India Family Game</title>
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="manifest" href="manifest.json"/>
</head>
<body>

  <!-- ═══ LOGIN OVERLAY ═══ -->
  <div id="screenLogin" class="overlay active-overlay">
    <div class="ov-wrap">
      <h1 class="ov-title">ADI - <span class="gold">FG</span></h1>
      <p class="ov-sub">AI Developer India Family Game</p>
      <div class="ov-card">
        <input type="text" id="inputName" placeholder="Your name..." maxlength="12" autocomplete="off"/>
        <button class="gold-btn" id="btnJoin">Join Game</button>
      </div>
      <p id="loginErr" class="err"></p>
    </div>
  </div>

  <!-- ═══ LOBBY OVERLAY ═══ -->
  <div id="screenLobby" class="overlay">
    <div class="ov-wrap">
      <h1 class="ov-title">ADI - FG<br><span class="gold">Arena...</span></h1>
      <div class="timer-ring">
        <svg viewBox="0 0 120 120"><circle cx="60" cy="60" r="52" class="t-bg"/><circle cx="60" cy="60" r="52" class="t-prog" id="timerCircle"/></svg>
        <span id="timerText" class="t-txt">2:00</span>
      </div>
      <p class="ov-sub">Game starts when clock hits zero.</p>
      <div class="ov-card">
        <div class="lobby-hdr"><span class="pill"><span id="lobbyN">0</span> players</span><span id="youBadge" class="you-badge">You #—</span></div>
        <ul id="pList" class="p-list"></ul>
      </div>
      <button class="gold-btn" id="btnForce" style="display:none">⚡ Start Now!</button>
      <p id="lobbyMsg" class="info"></p>
    </div>
  </div>

  <!-- ═══ SPECTATOR BANNER ═══ -->
  <div id="specBanner" class="spec-banner hidden">👁️ SPECTATOR MODE</div>

  <!-- ═══ BATTLE (canvas game) ═══ -->
  <div id="screenBattle" class="battle-screen" style="display:none">
    <header class="game-header">
      <h1 id="gameH1">Prototype · arrows vs arrows</h1>
      <p class="asura-name" id="opponentTitle">—</p>
    </header>

    <div class="layout">
      <div class="stage-wrap">
        <!-- Opponent HP -->
        <div class="hp-row">
          <span class="label" id="opHpLabel">Opponent</span>
          <div class="hp-bar"><div class="hp-fill" id="hpOpponent"></div></div>
        </div>

        <!-- Canvas Arena -->
        <div class="arena-outer">
          <div class="arena">
            <canvas id="cv" width="360" height="480" aria-label="Combat field"></canvas>
          </div>
        </div>

        <!-- Player Deck: weapon + fire lanes -->
        <div class="player-deck">
          <aside class="weapons" id="weaponRow">
            <h2>Your weapon</h2>
            <!-- Filled dynamically -->
          </aside>
          <div class="holes" id="holes"></div>
        </div>

        <!-- Your HP -->
        <div class="hp-row">
          <span class="label">You</span>
          <div class="hp-bar"><div class="hp-fill player" id="hpPlayer"></div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ GAME OVER MODAL ═══ -->
  <div id="modalGO" class="modal hidden">
    <div class="modal-box">
      <h1 id="winText">Game Over</h1>
      <p id="nextText" class="dim">Next match starting soon...</p>
    </div>
  </div>

  <!-- ═══ NEXT MATCH COUNTDOWN ═══ -->
  <div id="nextOv" class="modal hidden">
    <div class="modal-box">
      <h2>Next Match In</h2>
      <span id="nextTimer" class="big-cd">5</span>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
